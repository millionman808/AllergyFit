name: AllergyFit
options:
  bundleIdPrefix: com.elischafer
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: 5.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0
targets:
  AllergyFit:
    type: application
    platform: iOS
    sources:
      - AllergyFit
    info:
      path: AllergyFit/Resources/Info.plist
      properties:
        GIDClientID: 774051386593-n8fe3bpri3tkr7gdb30av32afvg9kssq.apps.googleusercontent.com
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.elischafer.allergyfit
            CFBundleURLSchemes: [allergyfit]
          - CFBundleTypeRole: Editor
            CFBundleURLName: google-signin
            CFBundleURLSchemes: [com.googleusercontent.apps.774051386593-n8fe3bpri3tkr7gdb30av32afvg9kssq]
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.elischafer.allergyfit
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: AllergyFit
        INFOPLIST_KEY_NSHealthShareUsageDescription: AllergyFit reads your workouts and active energy to tune your daily nutrition targets on training days.
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: AllergyFit can write the calories you log back to Apple Health so all your data stays in sync.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: AllergyFit uses your photos to read blood allergy test results you choose to scan.
        INFOPLIST_KEY_NSCameraUsageDescription: AllergyFit uses the camera to scan product barcodes and check them against your allergen profile.
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: 1
        ENABLE_USER_SCRIPT_SANDBOXING: true
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: AllergyFit/Resources/AllergyFit.entitlements
